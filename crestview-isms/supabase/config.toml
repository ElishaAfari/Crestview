project_id = "crestview-isms"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://crestview-fawn.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://crestview-fawn.vercel.app/**",
  "https://*-elisha-afari-s-projects.vercel.app/**"
]
jwt_expiry = 3600
enable_signup = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[storage]
enabled = true
file_size_limit = "50MiB"
